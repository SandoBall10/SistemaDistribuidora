spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/DISTRIBUIDORA}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:12345}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: erp
        dialect: org.hibernate.dialect.PostgreSQLDialect
    properties.hibernate.jdbc.time_zone: ${DB_TIME_ZONE:UTC}

server:
  error:
    include-message: always

springdoc:
  api-docs:
    enabled: false

jwt:
  # Se recomienda pasar secret en Base64 (por ejemplo: openssl rand -base64 64)
  secret: ${JWT_SECRET:AQIDBAUGBwgJCgsMDQ4PEBESExQVFhcYGRobHB0eHyA=}
  access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
  refresh-inactivity-ttl-minutes: ${JWT_REFRESH_INACTIVITY_TTL_MINUTES:30}
  refresh-absolute-ttl-days: ${JWT_REFRESH_ABSOLUTE_TTL_DAYS:7}

# Token Bearer para apis.net.pe (consulta RENIEC/SUNAT v2). Preferir API_PERU_TOKEN en entorno.
api:
  peru:
    token: ${API_PERU_TOKEN:sk_15756.w4vTECLJvgLfCWkQbB2c6QgYoyU621OW}
    # base-url: https://api.apis.net.pe

